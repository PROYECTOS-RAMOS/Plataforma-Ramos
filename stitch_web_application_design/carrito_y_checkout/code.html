<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Carrito y Revisión de Pedido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#0058be",
                        "on-tertiary-fixed": "#0b1c30",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#45464d",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#75859d",
                        "background": "#f7f9fb",
                        "tenant-accent": "#3B82F6",
                        "admin-deep-blue": "#0F172A",
                        "primary": "#000000",
                        "secondary-container": "#2170e4",
                        "surface-bright": "#f7f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#38485d",
                        "on-secondary-container": "#fefcff",
                        "primary-container": "#131b2e",
                        "border-subtle": "#E2E8F0",
                        "surface-container": "#eceef0",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e5",
                        "inverse-surface": "#2d3133",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "on-secondary-fixed": "#001a42",
                        "error": "#ba1a1a",
                        "on-primary-container": "#7c839b",
                        "status-canceled": "#EF4444",
                        "on-tertiary": "#ffffff",
                        "status-pending": "#F59E0B",
                        "status-completed": "#10B981",
                        "inverse-primary": "#bec6e0",
                        "tertiary": "#000000",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-background": "#191c1e",
                        "surface": "#f7f9fb",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#004395",
                        "primary-fixed": "#dae2fd",
                        "surface-tint": "#565e74",
                        "on-primary-fixed": "#131b2e",
                        "tertiary-container": "#0b1c30",
                        "surface-container-high": "#e6e8ea",
                        "tertiary-fixed": "#d3e4fe",
                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-fixed": "#d8e2ff",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d8dadc",
                        "primary-fixed-dim": "#bec6e0",
                        "outline-variant": "#c6c6cd",
                        "outline": "#76777d",
                        "on-surface": "#191c1e"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "gutter": "16px",
                        "section-gap": "32px",
                        "input-padding": "12px",
                        "base": "4px",
                        "container-margin": "24px",
                        "safe": "env(safe-area-inset-bottom, 24px)"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "price-display": ["Inter"],
                        "body-base": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "price-display": ["18px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface antialiased pb-[100px]">
<!-- Transactional Header (Suppressed main nav as per rules) -->
<header class="sticky top-0 z-40 bg-surface/90 backdrop-blur-md border-b border-border-subtle w-full h-16 flex items-center px-container-margin transition-colors duration-200">
<button class="mr-4 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary truncate flex-1">Tu Pedido</h1>
<div class="text-on-surface-variant font-label-caps text-label-caps flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span>Seguro</span>
</div>
</header>
<main class="max-w-md mx-auto px-container-margin py-section-gap space-y-section-gap">
<!-- Order Items List -->
<section class="space-y-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Artículos en tu carrito</h2>
<div class="bg-surface border border-border-subtle rounded-lg divide-y divide-border-subtle">
<!-- Product 1 -->
<div class="p-4 flex gap-4 items-center">
<div class="w-16 h-16 rounded bg-surface-container-low border border-border-subtle overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A high-quality, evenly lit studio product photograph of a modern, sleek wireless earbud charging case. The product is matte black, placed against a pure white background typical of modern e-commerce light-mode design. The lighting emphasizes the smooth curves and premium utilitarian aesthetic of the brand." src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg"/>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-body-base text-body-base font-semibold text-primary truncate">Auriculares Inalámbricos Pro</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Color: Grafito</p>
<div class="flex items-center gap-4 mt-2">
<div class="flex items-center border border-border-subtle rounded h-8">
<button class="px-2 text-on-surface-variant hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined text-[18px]">remove</span></button>
<span class="font-body-sm text-body-sm px-2 w-8 text-center">1</span>
<button class="px-2 text-on-surface-variant hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined text-[18px]">add</span></button>
</div>
</div>
</div>
<div class="text-right">
<span class="font-price-display text-price-display text-primary">$120.00</span>
</div>
</div>
<!-- Product 2 -->
<div class="p-4 flex gap-4 items-center">
<div class="w-16 h-16 rounded bg-surface-container-low border border-border-subtle overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A crisp, well-lit top-down product shot of a minimalist, durable smartphone protective case. The case is a muted slate gray color, presented perfectly flat on a bright, light-mode sterile white background. The image style is purely utilitarian, focusing on the texture and precise engineering of the object." src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg"/>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-body-base text-body-base font-semibold text-primary truncate">Funda Protectora Minimalista</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Modelo: X24</p>
<div class="flex items-center gap-4 mt-2">
<div class="flex items-center border border-border-subtle rounded h-8">
<button class="px-2 text-on-surface-variant hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined text-[18px]">remove</span></button>
<span class="font-body-sm text-body-sm px-2 w-8 text-center">2</span>
<button class="px-2 text-on-surface-variant hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined text-[18px]">add</span></button>
</div>
</div>
</div>
<div class="text-right flex flex-col justify-between h-full">
<span class="font-price-display text-price-display text-primary">$60.00</span>
<span class="font-body-sm text-body-sm text-on-surface-variant line-through">$80.00</span>
</div>
</div>
</div>
</section>
<!-- Discount Code -->
<section>
<div class="flex gap-2">
<input class="flex-1 h-12 px-input-padding bg-surface border border-border-subtle rounded-DEFAULT font-body-base text-body-base text-primary placeholder:text-on-surface-variant focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" placeholder="Código de descuento" type="text"/>
<button class="h-12 px-4 bg-surface-container-high hover:bg-surface-variant border border-border-subtle text-primary font-body-base text-body-base font-semibold rounded-DEFAULT transition-colors">
                    Aplicar
                </button>
</div>
</section>
<!-- Cost Breakdown -->
<section class="bg-surface border border-border-subtle rounded-lg p-6 space-y-4">
<div class="flex justify-between items-center font-body-base text-body-base text-on-surface-variant">
<span>Subtotal</span>
<span class="font-semibold text-primary">$180.00</span>
</div>
<div class="flex justify-between items-center font-body-base text-body-base text-on-surface-variant">
<span class="flex items-center gap-1">Envío <span class="material-symbols-outlined text-[16px] cursor-help" title="Calculado por zona">info</span></span>
<span class="font-semibold text-primary">$5.00</span>
</div>
<div class="pt-4 border-t border-border-subtle flex justify-between items-center">
<span class="font-headline-md text-headline-md text-primary">Total</span>
<span class="font-headline-md text-headline-md text-primary">$185.00</span>
</div>
</section>
<!-- Customer Data Form -->
<section class="space-y-4 pb-8">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Datos de Contacto</h2>
<div class="space-y-4">
<div>
<label class="block font-body-sm text-body-sm font-semibold text-on-surface-variant mb-1" for="name">Nombre Completo</label>
<input class="w-full h-12 px-input-padding bg-surface border border-border-subtle rounded-DEFAULT font-body-base text-body-base text-primary placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="name" placeholder="Ej. Juan Pérez" type="text"/>
</div>
<div>
<label class="block font-body-sm text-body-sm font-semibold text-on-surface-variant mb-1" for="phone">Teléfono (WhatsApp)</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined">call</span>
</span>
<input class="w-full h-12 pl-10 pr-input-padding bg-surface border border-border-subtle rounded-DEFAULT font-body-base text-body-base text-primary placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="phone" placeholder="+00 0000 0000" type="tel"/>
</div>
<p class="mt-1 font-body-sm text-body-sm text-on-tertiary-container flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">bolt</span>
                        Finalizarás el pedido rápidamente por chat.
                    </p>
</div>
</div>
</section>
</main>
<!-- Sticky Footer CTA -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-border-subtle p-container-margin pb-safe z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<div class="max-w-md mx-auto">
<button class="w-full h-14 bg-[#25D366] hover:bg-[#20bd5a] text-white rounded-lg flex items-center justify-center gap-2 font-headline-md text-headline-md font-bold transition-all active:scale-[0.98] shadow-sm">
<svg class="lucide lucide-message-circle" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"></path></svg>
                Finalizar Pedido
            </button>
</div>
</div>
</body></html>
