<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirmación de Pedido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "primary-container": "#131b2e",

                        "surface-variant": "#e0e3e5",

                        "xl": "0.5rem",

                    "spacing": {
                        "gutter": "16px",

<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-secondary/20 selection:text-secondary">
<!-- Main Content Area - Transactional Screen: Navigation Suppressed -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap w-full max-w-md mx-auto">
<!-- Success Animation / Icon -->
<div class="mb-section-gap relative flex items-center justify-center">
<!-- Subtle background glow -->
<div class="absolute w-32 h-32 bg-status-completed/20 rounded-full blur-2xl animate-pulse"></div>
<!-- Main Icon -->
<span class="material-symbols-outlined text-[80px] text-status-completed relative z-10" style="font-variation-settings: 'FILL' 1;">
                check_circle
            </span>
</div>
<!-- Messaging -->
<div class="text-center mb-section-gap space-y-gutter w-full">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
                ¡Pedido Enviado!
            </h1>
<p class="font-body-base text-body-base text-on-surface-variant px-4">
                Tu pedido ha sido enviado a WhatsApp para coordinar el pago y la entrega.
            </p>
</div>
<!-- Primary Action -->
<div class="w-full mb-section-gap">
<button class="w-full flex items-center justify-center gap-2 bg-secondary text-on-secondary py-4 px-6 rounded-full font-body-base text-body-base font-semibold hover:opacity-90 active:scale-95 transition-all shadow-sm">
<span class="material-symbols-outlined">storefront</span>
                Volver a la tienda
            </button>
</div>
<!-- Divider -->
<div class="w-full flex items-center gap-4 mb-section-gap opacity-50">
<div class="h-px bg-border-subtle flex-grow"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Contacto Rápido</span>
<div class="h-px bg-border-subtle flex-grow"></div>
</div>
<!-- Secondary Actions / Contact Links (Bento-style micro cards) -->
<div class="w-full grid grid-cols-2 gap-gutter">
<!-- WhatsApp -->
<a class="flex flex-col items-center justify-center p-4 bg-surface-container-lowest border border-border-subtle rounded-xl hover:bg-surface-container-low active:scale-95 transition-all" href="#">
<span class="material-symbols-outlined text-secondary mb-2" style="font-variation-settings: 'FILL' 1;">
                    chat
                </span>
<span class="font-body-sm text-body-sm font-semibold text-on-surface">WhatsApp</span>
</a>
<!-- Instagram -->
<a class="flex flex-col items-center justify-center p-4 bg-surface-container-lowest border border-border-subtle rounded-xl hover:bg-surface-container-low active:scale-95 transition-all" href="#">
<span class="material-symbols-outlined text-on-surface-variant mb-2">
                    photo_camera
                </span>
<span class="font-body-sm text-body-sm font-semibold text-on-surface">Instagram</span>
</a>
</div>
</main>
<!-- Simple footer text for context, minimal design -->
<footer class="w-full py-8 text-center bg-surface pb-safe">
<p class="font-label-caps text-label-caps text-on-surface-variant">
            © 2024 Powered by Efficient Commerce
        </p>
</footer>
</body></html>
